    // ─── Animated number tween for stat reveals ────────────────────
    function useAnimatedNumber(target, duration = 800) {
        const [value, setValue] = useState(0);
        const ref = useRef({ start: 0, from: 0, to: 0 });
        useEffect(() => {
            ref.current = { start: performance.now(), from: value, to: target };
            let raf;
            const tick = (now) => {
                const t = Math.min(1, (now - ref.current.start) / duration);
                const eased = 1 - Math.pow(1 - t, 3);
                const v = ref.current.from + (ref.current.to - ref.current.from) * eased;
                setValue(v);
                if (t < 1)
                    raf = requestAnimationFrame(tick);
            };
            raf = requestAnimationFrame(tick);
            return () => cancelAnimationFrame(raf);
            // eslint-disable-next-line
        }, [target]);
        return value;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
